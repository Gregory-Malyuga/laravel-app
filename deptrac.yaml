deptrac:
  paths:
    - ./app/Shared
    - ./app/Domains
  layers:
    - name: Resource
      collectors:
        - type: classNameRegex
          value: '#^App\\Http\\Resources\\.*#'
    - name: Middleware
      collectors:
        - type: classNameRegex
          value: '#^App\\Http\\Middleware\\.*#'
    - name: Service
      collectors:
        - type: classNameRegex
          value: '#^App\\Services\\.*#'
    - name: Repository
      collectors:
        - type: classNameRegex
          value: '#^App\\Repositories\\.*#'
    - name: Model
      collectors:
        - type: classNameRegex
          value: '#^App\\Models\\.*#'
    - name: Job
      collectors:
        - type: classNameRegex
          value: '#^App\\Jobs\\.*#'
    - name: Event
      collectors:
        - type: classNameRegex
          value: '#^App\\Events\\.*#'
    - name: Listener
      collectors:
        - type: classNameRegex
          value: '#^App\\Listeners\\.*#'
    - name: Provider
      collectors:
        - type: classNameRegex
          value: '#^App\\Providers\\.*#'
    - name: Command
      collectors:
        - type: classNameRegex
          value: '#^App\\Console\\.*#'
    - name: Exception
      collectors:
        - type: classNameRegex
          value: '#^App\\Exceptions\\.*#'
    # DDD layers — Domains\*\{Layer}\*
    - name: DomainLayer
      collectors:
        - type: classNameRegex
          value: '#^Domains\\[^\\]+\\Domain\\.*#'
    - name: ApplicationLayer
      collectors:
        - type: classNameRegex
          value: '#^Domains\\[^\\]+\\Application\\.*#'
    - name: InfrastructureLayer
      collectors:
        - type: classNameRegex
          value: '#^Domains\\[^\\]+\\Infrastructure\\.*#'
    - name: PresentationLayer
      collectors:
        - type: classNameRegex
          value: '#^Domains\\[^\\]+\\Presentation\\.*#'
    - name: DomainProvider
      collectors:
        - type: classNameRegex
          value: '#^Domains\\[^\\]+\\Providers\\.*#'
    - name: DomainTest
      collectors:
        - type: classNameRegex
          value: '#^Domains\\[^\\]+\\Tests\\.*#'
    - name: Laravel
      collectors:
        - type: classNameRegex
          value: '#^Illuminate\\.*#'
        - type: classNameRegex
          value: '#^Laravel\\.*#'
        - type: classNameRegex
          value: '#^Carbon\\.*#'
        - type: classNameRegex
          value: '#^Symfony\\.*#'
    - name: Elastic
      collectors:
        - type: classNameRegex
          value: '#^Elastic\\.*#'
    - name: OpenApi
      collectors:
        - type: classNameRegex
          value: '#^OpenApi\\.*#'
    - name: Spatie
      collectors:
        - type: classNameRegex
          value: '#^Spatie\\.*#'
    - name: Shared
      collectors:
        - type: classNameRegex
          value: '#^Shared\\(?!Testing\\).*#'
    - name: TestSupport
      collectors:
        - type: classNameRegex
          value: '#^Shared\\Testing\\.*#'
    - name: PHPUnit
      collectors:
        - type: classNameRegex
          value: '#^PHPUnit\\.*#'
    - name: Mockery
      collectors:
        - type: classNameRegex
          value: '#^Mockery.*#'
  ruleset:
    # HTTP layer: Controller orchestrates Service and returns Resource
    Controller:
      - Service
      - FormRequest
      - Resource
      - OpenApi
      - Laravel
    FormRequest:
      - Laravel
    Resource:
      - Model
      - Laravel
    Middleware:
      - Laravel
    # Business layer: Service orchestrates Repository and dispatches Jobs/Events
    # Service MUST NOT call another Service directly (§3 CLAUDE.md) — use Job or Event
    Service:
      - Repository
      - Job
      - Event
      - Model
      - Laravel
      - Elastic
    # Data layer
    Repository:
      - Model
      - Laravel
      - Elastic
    Model:
      - Laravel
    # Async
    Job:
      - Service
      - Repository
      - Model
      - Laravel
    Event:
      - Model
      - Laravel
    Listener:
      - Service
      - Repository
      - Laravel
    # Infrastructure / bootstrap
    Provider:
      - Service
      - Repository
      - Shared
      - Laravel
      - Elastic
    Command:
      - Service
      - Repository
      - Laravel
      - Elastic
    Exception:
      - Laravel
    Laravel: []
    Elastic: []
    OpenApi: []
    Spatie: []
    Shared:
      - Laravel
      - Elastic
      - Spatie
      - OpenApi
    PHPUnit: []
    TestSupport:
      - Shared
      - Laravel
      - Elastic
      - Spatie
      - PHPUnit
    # DDD layers
    DomainLayer:
      - Laravel
      - Spatie
    ApplicationLayer:
      - DomainLayer
      - InfrastructureLayer
      - Shared
      - Laravel
      - Spatie
    InfrastructureLayer:
      - DomainLayer
      - Shared
      - Laravel
      - Elastic
      - Spatie
    PresentationLayer:
      - ApplicationLayer
      - DomainLayer
      - Shared
      - Controller
      - Laravel
      - Spatie
      - OpenApi
    DomainProvider:
      - DomainLayer
      - ApplicationLayer
      - InfrastructureLayer
      - PresentationLayer
      - Shared
      - Laravel
    DomainTest:
      - DomainLayer
      - ApplicationLayer
      - InfrastructureLayer
      - PresentationLayer
      - DomainProvider
      - Shared
      - TestSupport
      - Laravel
      - Spatie
      - Elastic
      - PHPUnit
      - Mockery
