name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  security-events: write  # for SARIF upload

env:
  IMAGE: ghcr.io/${{ github.repository }}
  BASE_IMAGE: ghcr.io/gregory-malyuga/bootstrap-docker-php:latest

# ─────────────────────────────────────────────────────────────────────────────
# PREPARE
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  install:
    name: Composer Install
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gregory-malyuga/bootstrap-docker-php:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: vendor/
          retention-days: 1

# ─────────────────────────────────────────────────────────────────────────────
# LINT  (all parallel, no services)
# ─────────────────────────────────────────────────────────────────────────────
  lint-php-syntax:
    name: Lint / PHP Syntax
    needs: install
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gregory-malyuga/bootstrap-docker-php:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: vendor, path: vendor/ }
      - run: find app routes tests database -name '*.php' -print0 | xargs -0 -n1 php -l

  lint-code-style:
    name: Lint / Code Style (Pint)
    needs: install
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gregory-malyuga/bootstrap-docker-php:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: vendor, path: vendor/ }
      - run: php vendor/bin/pint --test

  lint-composer-normalize:
    name: Lint / Composer Normalize
    needs: install
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gregory-malyuga/bootstrap-docker-php:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: vendor, path: vendor/ }
      - run: composer normalize --dry-run --diff

  lint-doc-links:
    name: Lint / Doc Links
    needs: install
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gregory-malyuga/bootstrap-docker-php:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: vendor, path: vendor/ }
      - run: php bin/check-doc-links.php

# ─────────────────────────────────────────────────────────────────────────────
# ANALYZE  (parallel)
# ─────────────────────────────────────────────────────────────────────────────
  analyze-phpstan:
    name: Analyze / PHPStan
    needs: install
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gregory-malyuga/bootstrap-docker-php:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: vendor, path: vendor/ }
      - run: php vendor/bin/phpstan analyse --memory-limit=512M

  analyze-deptrac:
    name: Analyze / Deptrac
    needs: install
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gregory-malyuga/bootstrap-docker-php:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: vendor, path: vendor/ }
      - run: php vendor/bin/deptrac analyse --config-file=deptrac.yaml --fail-on-uncovered

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY / FS  (filesystem: secrets + known vulnerable packages)
# Runs on every branch — secrets must be caught before merge
# ─────────────────────────────────────────────────────────────────────────────
  security-fs:
    name: Security / Trivy FS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan (report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,vuln
          exit-code: '0'
          format: sarif
          output: trivy-fs.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Fail on secrets
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          exit-code: '1'

# ─────────────────────────────────────────────────────────────────────────────
# TEST  (PostgreSQL + Redis + Elasticsearch)
# ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Test Suite
    needs: [lint-php-syntax, lint-code-style, analyze-phpstan, analyze-deptrac]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/gregory-malyuga/bootstrap-docker-php:latest
      options: --user root
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: laravel-database-test
          POSTGRES_USER: laravel-database-user
          POSTGRES_PASSWORD: laravel-database-secret
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      elasticsearch:
        image: elasticsearch:8.13.4
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 30
    env:
      APP_KEY: base64:nzndTDnKTcSI51xvwTFZiLwU9AM5MLWqhnSr456y44A=
      APP_ENV: testing
      APP_DEBUG: "1"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: laravel-database-test
      DB_USERNAME: laravel-database-user
      DB_PASSWORD: laravel-database-secret
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: array
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: vendor, path: vendor/ }

      - run: php artisan config:clear
      - run: php artisan migrate --force
      - run: php vendor/bin/paratest --processes=4 --runner=WrapperRunner --log-junit=report.xml


      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: report.xml
          retention-days: 7

# ─────────────────────────────────────────────────────────────────────────────
# BUILD  (prod image → GHCR)
# Only on main / version tags, after all checks pass
# ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    needs:
      - lint-php-syntax
      - lint-code-style
      - lint-composer-normalize
      - lint-doc-links
      - analyze-phpstan
      - analyze-deptrac
      - test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          build-args: BASE_IMAGE=${{ env.BASE_IMAGE }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY / IMAGE  (scan the just-built prod image)
# ─────────────────────────────────────────────────────────────────────────────
  security-image:
    name: Security / Trivy Image
    needs: build
    runs-on: ubuntu-latest
    env:
      TRIVY_USERNAME: ${{ github.actor }}
      TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scan (report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          exit-code: '0'
          format: sarif
          output: trivy-image.sarif

      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Fail on fixable CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true

# ─────────────────────────────────────────────────────────────────────────────
# SMOKE  (boot the prod image, verify app bootstraps)
# ─────────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: artisan about
        run: |
          docker run --rm \
            -e APP_KEY=base64:nzndTDnKTcSI51xvwTFZiLwU9AM5MLWqhnSr456y44A= \
            -e APP_ENV=production -e APP_DEBUG=0 \
            -e DB_CONNECTION=sqlite -e DB_DATABASE=":memory:" \
            -e CACHE_STORE=array -e QUEUE_CONNECTION=sync -e SESSION_DRIVER=array \
            -e ELASTICSEARCH_URL=http://localhost:9200 \
            ${{ env.IMAGE }}:${{ github.sha }} \
            php artisan about --ansi

      - name: route:list
        run: |
          docker run --rm \
            -e APP_KEY=base64:nzndTDnKTcSI51xvwTFZiLwU9AM5MLWqhnSr456y44A= \
            -e APP_ENV=production -e APP_DEBUG=0 \
            -e DB_CONNECTION=sqlite -e DB_DATABASE=":memory:" \
            -e CACHE_STORE=array -e QUEUE_CONNECTION=sync -e SESSION_DRIVER=array \
            -e ELASTICSEARCH_URL=http://localhost:9200 \
            ${{ env.IMAGE }}:${{ github.sha }} \
            php artisan route:list --ansi

      - name: optimize (config/route/view cache)
        run: |
          docker run --rm \
            -e APP_KEY=base64:nzndTDnKTcSI51xvwTFZiLwU9AM5MLWqhnSr456y44A= \
            -e APP_ENV=production -e APP_DEBUG=0 \
            -e DB_CONNECTION=sqlite -e DB_DATABASE=":memory:" \
            -e CACHE_STORE=array -e QUEUE_CONNECTION=sync -e SESSION_DRIVER=array \
            -e ELASTICSEARCH_URL=http://localhost:9200 \
            ${{ env.IMAGE }}:${{ github.sha }} \
            php artisan optimize --ansi

# ─────────────────────────────────────────────────────────────────────────────
# RELEASE  (promote SHA image to :latest or :<semver>)
# ─────────────────────────────────────────────────────────────────────────────
  release-latest:
    name: Release / latest
    needs: [security-image, smoke]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ${{ env.IMAGE }}:${{ github.sha }}
          docker tag  ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
          docker push ${{ env.IMAGE }}:latest

  release-semver:
    name: Release / semver tag
    needs: [security-image, smoke]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ${{ env.IMAGE }}:${{ github.sha }}
          docker tag  ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:${{ github.ref_name }}
          docker push ${{ env.IMAGE }}:${{ github.ref_name }}
